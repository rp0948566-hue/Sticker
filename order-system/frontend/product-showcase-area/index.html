<meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --amazon-blue: #131921; --amazon-orange: #febd69; --bg: #f0f2f2; --white: #ffffff; --border: #d5d9d9; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #0f1111; overflow-x: hidden; }

    /* Anti-Snoop Overlay */
    #security-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .gate-spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid var(--amazon-orange); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    header { background: var(--amazon-blue); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .logo { color: #fff; font-weight: 800; font-size: 20px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
    .logo i { color: var(--amazon-orange); }

    .main-container { max-width: 900px; margin: 30px auto; padding: 0 20px; display: none; }
    .invoice-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 25px; margin-bottom: 20px; position: relative; }
    
    h1 { font-size: 24px; margin: 0 0 5px 0; font-weight: 700; }
    .order-date { color: #565959; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .info-text { font-size: 14px; line-height: 1.6; margin: 0; }

    /* Product Showcase Table */
    .showcase-header { margin-top: 30px; font-size: 18px; font-weight: 700; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .product-row { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #eee; align-items: center; }
    .product-img { width: 80px; height: 80px; background: #f7f7f7; border-radius: 6px; overflow: hidden; border: 1px solid #eee; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { flex: 1; }
    .product-name { font-weight: 700; color: #007185; font-size: 16px; margin-bottom: 4px; }
    .product-meta { font-size: 13px; color: #565959; }
    .product-price { font-weight: 800; font-size: 16px; width: 100px; text-align: right; }

    .grand-total-box { display: flex; flex-direction: column; align-items: flex-end; margin-top: 20px; }
    .total-line { display: flex; justify-content: space-between; width: 220px; font-size: 14px; margin-bottom: 5px; }
    .final-total { font-size: 18px; font-weight: 800; color: #B12704; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }

    /* Decoy View */
    #decoy-view { display: none; text-align: center; padding: 100px 20px; }
    #decoy-view i { font-size: 60px; color: #d5d9d9; margin-bottom: 20px; }
    #decoy-view h2 { font-size: 22px; color: #0f1111; }
    #decoy-view p { color: #565959; }
  </style>
