<html lang="en">
<head>

    <meta property="og:image" content="https://stickitup.xyz/IMAGE/collection-desktop.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://stickitup.xyz/login" />

    <meta name="twitter:description" content="Login or register your Classic Cult account to track orders and checkout faster." />

    <!-- Favicon -->

<meta charset="UTF-8">
  
  
  
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  </head>
<body>

  <a href="/home" class="back-home">
    <i class='bx bx-arrow-back'></i> Back to store
  </a>

  <div class="container">
    <div class="form-box login">
      <form id="login-form" autocomplete="on">
        <img src="/classic-cult-logo-cropped.png" alt="Classic Cult" class="login-logo">
        <p class="subtitle">Login to your account</p>
        <div class="input-box">
          <input type="email" name="email" placeholder="Email" autocomplete="email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Password" autocomplete="current-password" minlength="6" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <div class="forgot-link">
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>

    <div class="form-box register">
      <form id="signup-form" autocomplete="on">
        <img src="/classic-cult-logo-cropped.png" alt="Classic Cult" class="login-logo">
        <p class="subtitle">Create your account</p>
        <div class="input-box">
          <input type="text" name="name" placeholder="Full Name" autocomplete="name" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="email" name="email" placeholder="Email" autocomplete="email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Password" autocomplete="new-password" minlength="6" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <button type="submit" class="btn">Register</button>
      </form>
    </div>

    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1>Hello, Welcome!</h1>
        <p>Don't have an account?</p>
        <button class="btn register-btn" type="button">Register</button>
      </div>
      <div class="toggle-panel toggle-right">
        <h1>Welcome Back!</h1>
        <p>Already have an account?</p>
        <button class="btn login-btn" type="button">Login</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
