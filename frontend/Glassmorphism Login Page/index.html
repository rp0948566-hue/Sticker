<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Glassmorphism Login Page</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<link rel="stylesheet" href="../../src/loader.css">
</head>
<body>
	<script src="../../src/loader.js"></script>
	<a href="javascript:history.back()" class="back-btn">
		<i class="fas fa-arrow-left"></i> Back
	</a>
	<section>
		<div class="leaves">
			<div class="set">
				<div><img src="leaf_01.png"></div>
				<div><img src="leaf_02.png"></div>
				<div><img src="leaf_03.png"></div>
				<div><img src="leaf_04.png"></div>
				<div><img src="leaf_01.png"></div>
				<div><img src="leaf_02.png"></div>
				<div><img src="leaf_03.png"></div>
				<div><img src="leaf_04.png"></div>
			</div>
		</div>
		<img src="bg.jpg" class="bg">
		<img src="girl.png" class="girl">
		<img src="trees.png" class="trees">
		<div class="login">
			<h2>Sign In</h2>
			<form action="#" method="POST" style="width: 100%;">
				<div class="inputBox">
					<input type="text" name="username" placeholder="Username" required>
				</div>
				<div class="inputBox">
					<input type="password" name="password" placeholder="Password" required>
				</div>
				<div class="inputBox">
					<input type="number" name="mobile" placeholder="Mobile Number">
				</div>
				<div class="inputBox">
					<input type="text" name="address" placeholder="Address">
				</div>
				<div class="inputBox">
					<input type="number" name="pincode" placeholder="Pin Code">
				</div>
				<div class="inputBox">
					<input type="submit" value="Login" id="btn">
				</div>
			</form>
		</div>
		
	</section>
</body>
</html>
